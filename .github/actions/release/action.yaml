name: release
description: Build OctoBiz fonts and upload the distribution zip to the GitHub Release
inputs:
  tag:
    description: tag name to be released
    default: ''
  token:
    description: GitHub token
    required: true
runs:
  using: composite
  steps:
    - name: Install FontForge and ttfautohint
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y fontforge python3-fontforge ttfautohint
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
    - name: Build and package
      shell: bash
      run: |
        uv sync
        make package
        mkdir -p dist/release
        cp dist/*.zip dist/release/
    - uses: tcnksm/ghr@766f869eacbbb086e8860cf0f0192dda6e8e67e1 # v0.18.3
      with:
        tag: ${{ inputs.tag }}
        token: ${{ inputs.token }}
        path: dist/release
        replace: true
